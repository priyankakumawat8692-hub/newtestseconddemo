name: Test Project
on: push
jobs:
  test:
    run-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v7.0.0
      - name: install nodejs
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 18
      - name: install dependencies
        run: npm ci
      - name: run tests
        run: npm test